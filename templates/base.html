<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Equilibr{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f5f8;
            --surface: #ffffff;
            --surface-alt: #f8fafc;
            --border: #d9e0e8;
            --text: #1f2937;
            --muted: #5b6777;
            --accent: #0f766e;
            --accent-soft: #d7f3ef;
            --line: #2563eb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .topbar {
            background: #0f172a;
            color: #fff;
        }

        .topbar-inner,
        .page {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
        }

        .topbar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 0;
        }

        .brand {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topnav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .topnav a {
            color: #cbd5e1;
            font-size: 14px;
        }

        .topnav a:hover {
            color: #fff;
        }

        .page {
            padding: 24px 0 40px;
        }

        .search-form {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .search-form input,
        .search-form select,
        .search-form button {
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 12px;
            font: inherit;
        }

        .search-form input {
            min-width: 280px;
            background: #fff;
        }

        .search-form button,
        .button {
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            border: 0;
            padding: 0 16px;
        }

        .search-form button:hover,
        .button:hover {
            background: #115e59;
            text-decoration: none;
        }

        .breadcrumbs {
            margin: 0 0 20px;
            padding: 0;
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            color: var(--muted);
            font-size: 14px;
        }

        .breadcrumbs li:not(:last-child)::after {
            content: "/";
            margin-left: 8px;
            color: #94a3b8;
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .section + .section {
            margin-top: 16px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: start;
            margin-bottom: 20px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 30px;
            line-height: 1.2;
        }

        .subtle {
            color: var(--muted);
        }

        .meta-grid,
        .content-grid,
        .stats-grid,
        .chart-grid {
            display: grid;
            gap: 16px;
        }

        .content-grid {
            grid-template-columns: minmax(300px, 380px) 1fr;
            align-items: start;
        }

        .stats-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .chart-grid {
            grid-template-columns: 1fr;
        }

        .meta-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            margin: 0;
        }

        .meta-list div {
            min-width: 180px;
        }

        .meta-list dt {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .meta-list dd {
            margin: 0;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        th {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0;
            color: var(--muted);
            background: var(--surface-alt);
        }

        .tag-list,
        .link-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #134e4a;
            font-size: 13px;
        }

        .stat {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }

        .chart-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            background: var(--surface-alt);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .chart-header h3 {
            margin: 0;
            font-size: 18px;
        }

        .segmented {
            display: inline-flex;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        .segmented button {
            border: 0;
            background: #fff;
            color: var(--text);
            padding: 8px 12px;
            cursor: pointer;
        }

        .segmented button.is-active {
            background: var(--accent);
            color: #fff;
        }

        .chart-frame {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
        }

        .chart-frame svg {
            display: block;
            width: 100%;
            height: auto;
        }

        .empty {
            padding: 24px;
            text-align: center;
            color: var(--muted);
        }

        .form-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field label {
            font-size: 14px;
            font-weight: 600;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font: inherit;
            background: #fff;
            color: var(--text);
        }

        .field textarea {
            resize: vertical;
            min-height: 320px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
        }

        .errorlist,
        .messages {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .messages li,
        .errorlist li,
        .form-errors {
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: #991b1b;
            border-radius: 8px;
            padding: 12px 14px;
        }

        .code-note {
            font-family: Consolas, "Courier New", monospace;
            font-size: 13px;
            white-space: pre-wrap;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .reference-item + .reference-item {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .footer {
            margin-top: 24px;
            color: var(--muted);
            font-size: 13px;
        }

        @media (max-width: 900px) {
            .topbar-inner,
            .page-header,
            .content-grid,
            .stats-grid {
                grid-template-columns: 1fr;
                display: grid;
            }

            .topbar-inner {
                justify-content: stretch;
            }

            .search-form input {
                min-width: 0;
                width: 100%;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div class="topbar-left">
            <a class="brand" href="{% url 'substance-list' %}">Equilibr</a>
            <nav class="topnav">
                <a href="{% url 'substance-list' %}">База данных</a>
                <a href="{% url 'equilibrium-calculator' %}">Равновесие</a>
                <a href="{% url 'icp_stat:graph-page' %}">ICP Stat</a>
            </nav>
        </div>
        <form class="search-form" action="{% url 'substance-list' %}" method="get">
            <input type="search" name="q" value="{{ query|default:'' }}" placeholder="Поиск по обозначению, формуле или названию">
            <button type="submit">Найти</button>
        </form>
    </div>
</header>
<main class="page">
    {% block content %}{% endblock %}
</main>
</body>
</html>
